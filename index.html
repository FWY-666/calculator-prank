<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计算器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  user-select: none;
}

.container { width: 340px; max-width: 95vw; position: relative; }

/* ===== 计算器 ===== */
.calc { display: block; }

.calc .display {
  background: #16213e;
  border-radius: 16px 16px 0 0;
  padding: 24px 20px;
  min-height: 110px;
  display: flex; flex-direction: column;
  justify-content: flex-end; align-items: flex-end;
  word-break: break-all;
  position: relative; overflow: hidden;
  transition: opacity .08s;
}

.calc .display.flicker { opacity: .4; }

.calc .display.shake {
  animation: shake .4s ease;
}

.calc .expr {
  color: #7b8ba3; font-size: 18px; min-height: 24px;
  transition: color .15s; width: 100%; text-align: right;
}

.calc .expr.error { color: #e94560; }

.calc .result {
  color: #fff; font-size: 36px; font-weight: 300;
  margin-top: 4px; min-height: 42px; width: 100%; text-align: right;
}

/* 假进度条 */
.calc .fake-progress {
  display: none; width: 100%; height: 4px;
  background: #2d2d44; border-radius: 2px; margin-top: 8px; overflow: hidden;
}

.calc .fake-progress .fill {
  height: 100%; width: 0;
  background: linear-gradient(90deg, #0abde3, #e94560);
  border-radius: 2px;
  transition: width 1s ease-in;
}

/* 警告文字 */
.calc .warn-msg {
  display: none; color: #e94560; font-size: 14px;
  margin-top: 6px; text-align: right; width: 100%;
}

/* Trial notice */
.trial-notice {
  display: none; position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  background: #e94560; color: #fff; font-size: 12px;
  padding: 4px 14px; border-radius: 12px; white-space: nowrap;
  z-index: 10; animation: fadeOut 2s ease forwards;
}

@keyframes fadeOut {
  0% { opacity: 1; }
  70% { opacity: 1; }
  100% { opacity: 0; }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  15% { transform: translateX(-6px); }
  30% { transform: translateX(6px); }
  45% { transform: translateX(-4px); }
  60% { transform: translateX(4px); }
  75% { transform: translateX(-2px); }
  90% { transform: translateX(2px); }
}

.calc .btns {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 2px; background: #0f0f23;
  border-radius: 0 0 16px 16px;
  overflow: hidden;
}

.calc .btns button {
  border: none; outline: none;
  font-size: 22px; padding: 18px 0;
  cursor: pointer; transition: opacity .15s;
}

.calc .btns button:active { opacity: .7; }

.calc .btn-fn  { background: #2d2d44; color: #e94560; }
.calc .btn-op  { background: #2d2d44; color: #0abde3; }
.calc .btn-num { background: #3d3d5c; color: #fff; }
.calc .btn-eq  { background: #e94560; color: #fff; }

/* ===== 会员页 ===== */
.vip {
  display: none; text-align: center; padding: 20px;
}

.vip .icon { font-size: 64px; margin-bottom: 4px; }

.vip h2 {
  color: #f0c040; font-size: 22px; margin-bottom: 4px;
}

.vip .subtitle {
  color: #999; font-size: 14px; margin-bottom: 12px;
}

/* 假数据 */
.vip .stats-row {
  display: flex; justify-content: center; gap: 20px;
  margin-bottom: 6px; font-size: 12px; color: #666;
}

.vip .stats-row span { color: #f0c040; font-weight: 600; }

/* 倒计时 */
.vip .countdown-box {
  display: inline-block; background: #2d1a1a; color: #e94560;
  font-size: 13px; padding: 6px 16px; border-radius: 20px;
  margin-bottom: 16px; font-weight: 600;
}

.vip .cards { display: flex; flex-direction: column; gap: 14px; }

.vip .card {
  background: linear-gradient(135deg, #1e1e3a 0%, #2a1a3a 100%);
  border: 2px solid #333;
  border-radius: 14px; padding: 20px;
  cursor: pointer; transition: transform .2s, border-color .2s;
  text-align: left; position: relative; overflow: hidden;
}

.vip .card:hover { transform: translateY(-2px); }

.vip .card.gold {
  border-color: #f0c040;
  background: linear-gradient(135deg, #1e1a0a 0%, #2a2010 100%);
}

.vip .card .shimmer {
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
  animation: shimmer 2.5s infinite;
}

.vip .card.gold .shimmer {
  background: linear-gradient(90deg, transparent, rgba(240,192,64,.1), transparent);
}

@keyframes shimmer {
  0% { left: -100%; }
  100% { left: 200%; }
}

.vip .card .badge {
  position: absolute; top: 12px; right: 14px;
  background: #e94560; color: #fff; font-size: 11px;
  padding: 3px 8px; border-radius: 20px;
}

.vip .card .name { color: #fff; font-size: 18px; font-weight: 600; }
.vip .card .desc { color: #888; font-size: 13px; margin-top: 4px; }

.vip .card .price {
  margin-top: 12px; font-size: 28px; font-weight: 700; color: #f0c040;
}

.vip .card .price em {
  font-style: normal; font-size: 14px; font-weight: 400; color: #888;
}

/* 假评论滚动 */
.vip .comment-bar {
  margin-top: 16px; font-size: 12px; color: #555;
  overflow: hidden; height: 20px; position: relative;
}

.vip .comment-bar .cmt {
  position: absolute; width: 100%; animation: slideUp 3s ease-in-out infinite; opacity: 0;
}

.vip .comment-bar .cmt:nth-child(1) { animation-delay: 0s; }
.vip .comment-bar .cmt:nth-child(2) { animation-delay: 1s; }
.vip .comment-bar .cmt:nth-child(3) { animation-delay: 2s; }

@keyframes slideUp {
  0% { opacity: 0; transform: translateY(10px); }
  20% { opacity: 1; transform: translateY(0); }
  80% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-10px); }
}

.vip .back {
  display: inline-block; margin-top: 20px;
  color: #666; font-size: 13px; cursor: pointer;
  text-decoration: underline;
}

/* ===== Toast ===== */
.toast-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 100; justify-content: center; align-items: center;
}

.toast-overlay.show { display: flex; }

.toast-box {
  background: #1e1e3a; border-radius: 16px;
  padding: 32px 24px; text-align: center;
  max-width: 300px; animation: popIn .3s ease;
}

@keyframes popIn {
  from { transform: scale(.8); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.toast-box .toast-icon { font-size: 56px; margin-bottom: 8px; }
.toast-box .toast-title { color: #f0c040; font-size: 20px; font-weight: 600; }
.toast-box .toast-msg { color: #aaa; font-size: 14px; margin-top: 8px; }

.toast-box button {
  margin-top: 20px; padding: 10px 40px;
  border: none; border-radius: 24px;
  background: #f0c040; color: #1a1a2e;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: opacity .15s;
}

.toast-box button:active { opacity: .8; }
</style>
</head>
<body>

<div class="container">

  <!-- ===== 计算器 ===== -->
  <div class="calc" id="calcPage">
    <div class="display" id="display">
      <div class="expr" id="expr"></div>
      <div class="result" id="result"></div>
      <div class="fake-progress" id="fakeProgress"><div class="fill"></div></div>
      <div class="warn-msg" id="warnMsg"></div>
    </div>
    <div class="trial-notice" id="trialNotice"></div>
    <div class="btns">
      <button class="btn-fn"  onclick="clearAll()">C</button>
      <button class="btn-fn"  onclick="append('(')">(</button>
      <button class="btn-fn"  onclick="append(')')">)</button>
      <button class="btn-op"  onclick="append('/')">÷</button>

      <button class="btn-num" onclick="append('7')">7</button>
      <button class="btn-num" onclick="append('8')">8</button>
      <button class="btn-num" onclick="append('9')">9</button>
      <button class="btn-op"  onclick="append('*')">×</button>

      <button class="btn-num" onclick="append('4')">4</button>
      <button class="btn-num" onclick="append('5')">5</button>
      <button class="btn-num" onclick="append('6')">6</button>
      <button class="btn-op"  onclick="append('-')">−</button>

      <button class="btn-num" onclick="append('1')">1</button>
      <button class="btn-num" onclick="append('2')">2</button>
      <button class="btn-num" onclick="append('3')">3</button>
      <button class="btn-op"  onclick="append('+')">+</button>

      <button class="btn-num" onclick="append('0')">0</button>
      <button class="btn-num" onclick="append('.')">.</button>
      <button class="btn-eq"  onclick="goVip()" style="grid-column: span 2">=</button>
    </div>
  </div>

  <!-- ===== 会员页 ===== -->
  <div class="vip" id="vipPage">
    <div class="icon">👑</div>
    <h2>计算结果需要开通会员</h2>
    <p class="subtitle">开通后即可查看计算结果，尊享无限算力</p>

    <div class="stats-row">
      已开通 <span id="userCount">1,283,947</span> 人
      &nbsp;|&nbsp;
      今日新增 <span id="todayNew">3,842</span> 人
    </div>

    <div class="countdown-box">⏱ 限时优惠 <span id="countdown">23:59:48</span></div>

    <div class="cards">
      <div class="card" onclick="buy(298, '年')">
        <span class="badge">热门</span>
        <div class="shimmer"></div>
        <div class="name">标准会员</div>
        <div class="desc">畅享全年计算服务</div>
        <div class="price">298 <em>元/年</em></div>
      </div>

      <div class="card gold" onclick="buy(598, '永久')">
        <span class="badge">推荐</span>
        <div class="shimmer"></div>
        <div class="name">至尊会员</div>
        <div class="desc">一次付费，终身计算</div>
        <div class="price">598 <em>元/永久</em></div>
      </div>
    </div>

    <div class="comment-bar">
      <div class="cmt">广东 王** 刚刚开通了至尊会员</div>
      <div class="cmt">北京 李** 刚刚开通了标准会员</div>
      <div class="cmt">浙江 张** 刚刚开通了至尊会员</div>
    </div>

    <span class="back" onclick="goBack()">← 返回计算器（试用模式）</span>
  </div>

</div>

<!-- Toast 弹窗 -->
<div class="toast-overlay" id="toast">
  <div class="toast-box">
    <div class="toast-icon">✅</div>
    <div class="toast-title" id="toastTitle">充值成功</div>
    <div class="toast-msg" id="toastMsg"></div>
    <button onclick="closeToast()">好的</button>
  </div>
</div>

<script>
let currentExpr = '';
let trollTimer = null;
let countdownTimer = null;

// ---- 屏幕虚晃 ----
function scheduleFlicker() {
  const delay = 8000 + Math.random() * 12000;
  clearTimeout(trollTimer);
  trollTimer = setTimeout(() => {
    const d = document.getElementById('display');
    d.classList.add('flicker');
    setTimeout(() => d.classList.remove('flicker'), 80);
    scheduleFlicker();
  }, delay);
}

// ---- 计算器逻辑 ----
function updateDisplay() {
  document.getElementById('expr').textContent = currentExpr;
}

function append(ch) {
  currentExpr += ch;
  updateDisplay();
}

function clearAll() {
  // 15% 几率整蛊
  if (Math.random() < 0.15) {
    const exprEl = document.getElementById('expr');
    exprEl.classList.add('error');
    exprEl.textContent = 'ERR0R';
    setTimeout(() => {
      exprEl.classList.remove('error');
      currentExpr = '';
      updateDisplay();
    }, 600);
    return;
  }
  currentExpr = '';
  updateDisplay();
}

// ---- 等于号 → 过渡动画 → VIP ----
function goVip() {
  const display = document.getElementById('display');
  const exprEl = document.getElementById('expr');
  const progBar = document.getElementById('fakeProgress');
  const warn = document.getElementById('warnMsg');

  // 1. 抖动
  display.classList.add('shake');
  setTimeout(() => display.classList.remove('shake'), 400);

  // 2. 屏幕显示 Calculating...
  exprEl.textContent = 'Calculating...';
  progBar.style.display = 'block';
  progBar.querySelector('.fill').style.width = '0';

  requestAnimationFrame(() => {
    progBar.querySelector('.fill').style.width = '100%';
  });

  // 3. 进度条走完后显示警告
  setTimeout(() => {
    exprEl.textContent = '';
    progBar.style.display = 'none';
    warn.style.display = 'block';
    warn.textContent = '⚠ 检测到未付费用户';
  }, 1100);

  // 4. 切到VIP页
  setTimeout(() => {
    warn.style.display = 'none';
    progBar.querySelector('.fill').style.width = '0';
    document.getElementById('calcPage').style.display = 'none';
    document.getElementById('vipPage').style.display = 'block';
    resetVipAnimations();
  }, 1600);
}

// ---- 返回计算器 ----
function goBack() {
  document.getElementById('vipPage').style.display = 'none';
  document.getElementById('calcPage').style.display = 'block';
  currentExpr = '';
  updateDisplay();

  // 显示试用提示
  const notice = document.getElementById('trialNotice');
  notice.textContent = '已重置为试用模式（剩余 2 次）';
  notice.style.display = 'block';
  notice.style.animation = 'none';
  notice.offsetHeight;
  notice.style.animation = 'fadeOut 2s ease forwards';
  setTimeout(() => { notice.style.display = 'none'; }, 2000);
}

// ---- 会员页动画 ----
function resetVipAnimations() {
  // 假用户数微调
  const base = 1283947 + Math.floor(Math.random() * 5000);
  document.getElementById('userCount').textContent = base.toLocaleString();
  document.getElementById('todayNew').textContent = (3800 + Math.floor(Math.random() * 200)).toLocaleString();

  // 倒计时
  if (countdownTimer) clearInterval(countdownTimer);
  let secs = 23 * 3600 + 59 * 60 + 48;
  countdownTimer = setInterval(() => {
    if (secs <= 3600) secs = 23 * 3600 + 59 * 60 + 48;
    secs--;
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    document.getElementById('countdown').textContent =
      String(h).padStart(2,'0') + ':' +
      String(m).padStart(2,'0') + ':' +
      String(s).padStart(2,'0');
  }, 1000);
}

// ---- 会员逻辑 ----
function buy(price, type) {
  const msgs = [
    '已扣费 ¥' + price + '，财务已下班，明天到账。',
    '恭喜！你已经是尊贵的' + type + '会员了。\n（当然，计算功能还是用不了）',
    '支付成功！计算结果将在 2099 年前推送给你。',
    '扣款成功！请截图发给客服领取你的专属答案。',
    '支付成功！您的计算结果：114514',
    '恭喜获得"大冤种"称号！🏆',
    '已扣款 ¥' + price + '，VIP 权益将于明天生效...大概吧。'
  ];
  const msg = msgs[Math.floor(Math.random() * msgs.length)];
  document.getElementById('toastTitle').textContent = '充值成功 🎉';
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toast').classList.add('show');
}

function closeToast() {
  document.getElementById('toast').classList.remove('show');
}

// 初始化
updateDisplay();
scheduleFlicker();
</script>

</body>
</html>
